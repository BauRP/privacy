<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIVO CHAT | GLOBAL PRIVACY & LEGAL SHIELD</title>
    <style>
        :root { --neon: #0f0; --dim: #030; --blue: #00ffff; --warn: #ff003c; --gold: #ffd700; }
        body, html { background: #000; color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .scanline { width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 50%, rgba(0,255,0,0.02) 50%); background-size: 100% 4px; position: fixed; pointer-events: none; z-index: 100; }
        
        .lang-control { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; align-items: center; background: rgba(0,20,0,0.8); padding: 10px; border: 1px solid var(--neon); box-shadow: 0 0 15px var(--dim); }
        .lang-btn { background: transparent; border: 1px solid var(--dim); color: var(--dim); padding: 5px 12px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.3s; }
        .lang-btn.active { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 10px var(--blue); }

        .wrapper { max-width: 1150px; margin: 50px auto; padding: 50px; border: 1px solid var(--neon); background: rgba(0,5,0,0.98); box-shadow: 0 0 60px var(--dim); position: relative; }
        .status-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--blue); border-bottom: 2px solid var(--dim); padding-bottom: 15px; margin-bottom: 40px; text-transform: uppercase; }
        
        h1 { font-size: 2.2rem; text-align: center; text-shadow: 0 0 20px var(--neon); margin-bottom: 10px; text-transform: uppercase; }
        .doc-sub { text-align: center; color: var(--blue); font-size: 0.9rem; margin-bottom: 50px; opacity: 0.8; }
        
        h2 { color: var(--blue); border-left: 6px solid var(--blue); padding-left: 20px; margin-top: 50px; font-size: 1.4rem; text-transform: uppercase; background: rgba(0,255,255,0.05); padding: 10px 20px; }
        h3 { color: var(--gold); font-size: 1.1rem; margin-top: 30px; border-bottom: 1px solid var(--dim); display: inline-block; }
        
        .security-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 30px 0; }
        .security-card { border: 1px solid var(--dim); padding: 20px; background: rgba(0,40,0,0.2); transition: 0.3s; border-radius: 4px; }
        .security-card strong { color: var(--blue); display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.9rem; }

        .critical-alert { border: 3px double var(--warn); padding: 35px; background: rgba(60, 0, 0, 0.4); margin: 40px 0; position: relative; }
        .critical-tag { position: absolute; top: -18px; left: 30px; background: var(--warn); color: #fff; padding: 4px 20px; font-weight: bold; }
        
        p, li { color: #afffaf; line-height: 1.7; font-size: 0.95rem; text-align: justify; margin-bottom: 15px; }
        .highlight { color: #fff; font-weight: bold; }
        .link { color: var(--blue); text-decoration: underline; cursor: pointer; }
        
        .footer { margin-top: 80px; text-align: center; font-size: 0.85rem; color: #666; border-top: 1px solid #333; padding-top: 40px; }
        .abuse-box { text-align: center; border: 1px solid var(--dim); padding: 25px; background: rgba(0,255,0,0.05); margin-top: 30px; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        @media (max-width: 768px) { .wrapper { padding: 20px; } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="scanline"></div>

    <div class="lang-control">
        <button id="btn-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button id="btn-ru" class="lang-btn" onclick="setLanguage('ru')">RU</button>
    </div>

    <div class="wrapper">
        <div class="status-header">
            <span id="txt-layer"></span>
            <span id="txt-node"></span>
            <span class="blink">● ENCRYPTION_STABLE</span>
        </div>

        <h1 id="txt-main-title"></h1>
        <p class="doc-sub" id="txt-doc-sub"></p>

        <h2 id="h-sec1"></h2>
        <div class="security-grid" id="grid1"></div>

        <h2 id="h-sec2"></h2>
        <div class="critical-alert">
            <div class="critical-tag" id="tag-crit"></div>
            <p id="txt-crit-p"></p>
            <p style="font-size: 0.8rem; color: var(--warn);" id="txt-crit-note"></p>
        </div>

        <h2 id="h-sec3"></h2>
        <div class="security-grid" id="grid2"></div>

        <h2 id="h-sec4"></h2>
        <div id="u-safety"></div>

        <h2 id="h-sec5"></h2>
        <div class="security-grid" id="grid3"></div>

        <div class="footer" id="txt-footer"></div>
        
        <div class="abuse-box">
            <span id="f-contact-title" style="color: var(--blue); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;"></span><br>
            <span class="highlight" style="font-size: 1.3rem; color: #fff; text-shadow: 0 0 10px var(--neon);">trivo.support@proton.me</span>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                "txt-layer": "Security Layer: OMNI-REDUNDANT",
                "txt-node": "Node Status: ACTIVE",
                "txt-main-title": "TRIVO CHAT: PRIVACY ARCHITECTURE",
                "txt-doc-sub": "Global Standard // v2.5.0 // Effective: April 2026",
                "h-sec1": "I. LIABILITY PROTECTION & DISCLAIMERS",
                "grid1": [
                    ["Section 230 Protection", "Trivo Chat is a platform (interactive service), not a publisher. We are not liable for user-generated content or messages."],
                    ["As-Is Basis", "The application is provided without warranties. We are not liable for network failures or data loss."],
                    ["Limitation of Damages", "You agree that we are not liable for any incidental, indirect, or financial damages arising from app use."],
                    ["Arbitration Clause", "Any disputes shall be resolved through individual binding arbitration only. Class action waiver is active."],
                    ["Force Majeure", "We are not responsible for service interruptions caused by global internet outages or hacking attacks."]
                ],
                "h-sec2": "II. CHILDREN'S PRIVACY (COPPA / GDPR-K)",
                "tag-crit": "STRICT COMPLIANCE",
                "txt-crit-p": "Service is for users 13+ only (16+ in EU). We do not knowingly collect or sell data from minors. Any detected minor accounts will be terminated immediately. No behavioral tracking for children.",
                "txt-crit-note": "*Sanctions executed at node level; re-entry is technically impossible for the flagged device ID.",
                "h-sec3": "III. DATA SOVEREIGNTY (GDPR / CCPA / LGPD)",
                "grid2": [
                    ["Right to Erasure", "Deleting the app wipes all local encryption keys and data. We have no residual storage."],
                    ["Do Not Sell My Info", "We do not sell data. You can opt-out of Advertising ID tracking via Android System Settings."],
                    ["No Discrimination", "Your privacy choices will not result in any functional degradation or price changes."],
                    ["Lawful Basis", "Data processing is strictly based on explicit consent for the purpose of P2P connection performance."],
                    ["Eraser Law", "Users under 18 can request removal of their own content via app deletion or support contact."]
                ],
                "h-sec4": "IV. USER SAFETY & LEGAL PROCESS (DMCA)",
                "u-safety": "<p><strong>DMCA Notice:</strong> To report copyright infringement, email our agent with proof of ownership. We blacklist repeat offenders.</p><p><strong>Zero Tolerance:</strong> Immediate Peer-ID blacklisting for child exploitation, extremism, or terrorism promotion.</p>",
                "h-sec5": "V. GLOBAL TERMS & TRANSFERS",
                "grid3": [
                    ["Cross-Border Transfer", "Encrypted packets transit via relay nodes in various global jurisdictions. Using app constitutes consent."],
                    ["Statute of Limitations", "Any claim against us must be filed within one (1) year after the cause of action arose."],
                    ["Biometric Privacy", "FaceID/Fingerprint is processed by the Android System; Trivo Chat has 0% access to raw data."],
                    ["AdMob Transparency", "Third-party SDK (Google AdMob) may collect technical IDs. Refer to Google's Privacy Policy."]
                ],
                "txt-footer": "CONFIDENTIALITY LEVEL: MAXIMUM // PROTOCOL: TRV-X-2026 // © 2026 TRIVO SECURE SYSTEMS",
                "f-contact-title": "Abuse & Legal Official Contact (ADA Compliant):"
            },
            ru: {
                "txt-layer": "Уровень защиты: ОМНИ-РЕЗЕРВИРОВАНИЕ",
                "txt-node": "Статус узла: АКТИВЕН",
                "txt-main-title": "TRIVO CHAT: АРХИТЕКТУРА ПРИВАТНОСТИ",
                "txt-doc-sub": "Глобальный стандарт // v2.5.0 // В силе: Апрель 2026",
                "h-sec1": "I. ЗАЩИТА ОТ ИСКОВ И ОГРАНИЧЕНИЯ",
                "grid1": [
                    ["Защита Section 230", "Trivo Chat — это платформа, а не издатель. Мы не несем ответственности за сообщения пользователей."],
                    ["База «Как есть»", "Приложение предоставляется без гарантий. Мы не отвечаем за сбои сети или потерю данных."],
                    ["Ограничение ущерба", "Вы соглашаетесь, что мы не возмещаем косвенные или финансовые убытки от использования приложения."],
                    ["Арбитражный пункт", "Все споры решаются через индивидуальный арбитраж. Отказ от групповых исков обязателен."],
                    ["Форс-мажор", "Мы не отвечаем за сбои, вызванные глобальными проблемами интернета или хакерскими атаками."]
                ],
                "h-sec2": "II. ЗАЩИТА ДЕТЕЙ (COPPA / GDPR-K)",
                "tag-crit": "СТРОГОЕ СООТВЕТСТВИЕ",
                "txt-crit-p": "Сервис только для лиц 13+ (16+ в ЕС). Мы не собираем и не продаем данные детей. Аккаунты детей удаляются мгновенно при обнаружении. Поведенческая реклама для детей запрещена.",
                "txt-crit-note": "*Блокировка на уровне узла; повторный вход для ID устройства технически невозможен.",
                "h-sec3": "III. ПРАВА НА ДАННЫЕ (GDPR / CCPA / LGPD)",
                "grid2": [
                    ["Право на забвение", "Удаление приложения стирает все ключи и данные. У нас нет резервных копий."],
                    ["Не продавать мои данные", "Мы не торгуем данными. Отключите трекинг рекламы в настройках Android."],
                    ["Без дискриминации", "Ваш выбор в пользу приватности не приведет к ограничению функций или доступу к чату."],
                    ["Законное основание", "Обработка данных ведется только на основе вашего согласия для работы P2P-сети."],
                    ["Право на ошибку", "Лица до 18 лет могут потребовать удаления своего контента через удаление приложения."]
                ],
                "h-sec4": "IV. БЕЗОПАСНОСТЬ И ЗАКОН (DMCA)",
                "u-safety": "<p><strong>DMCA (Авторское право):</strong> Сообщайте о нарушениях на почту с доказательствами. Мы блокируем нарушителей.</p><p><strong>Нулевая терпимость:</strong> Мгновенный бан за экстремизм, терроризм или эксплуатацию детей.</p>",
                "h-sec5": "V. ГЛОБАЛЬНЫЕ УСЛОВИЯ",
                "grid3": [
                    ["Трансграничная передача", "Зашифрованные пакеты проходят через узлы в разных странах. Использование — это ваше согласие."],
                    ["Срок давности", "Любой иск должен быть подан в течение одного (1) года после возникновения инцидента."],
                    ["Биометрия", "FaceID обрабатывается системой Android; Trivo Chat не видит ваши биометрические данные."],
                    ["Прозрачность AdMob", "SDK Google AdMob может собирать технические ID. См. правила Google."]
                ],
                "txt-footer": "УРОВЕНЬ КОНФИДЕНЦИАЛЬНОСТИ: МАКСИМУМ // ПРОТОКОЛ TRV-X-2026 // © 2026 TRIVO SECURE SYSTEMS",
                "f-contact-title": "Официальный юридический контакт (ADA Compliant):"
            }
        };

        function setLanguage(lang) {
            const data = translations[lang];
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
            
            for (let key in data) {
                const el = document.getElementById(key);
                if (el) {
                    if (key.startsWith('grid')) {
                        el.innerHTML = data[key].map(i => `<div class="security-card"><strong>${i[0]}</strong><span>${i[1]}</span></div>`).join('');
                    } else { el.innerHTML = data[key]; }
                }
            }
            localStorage.setItem('trivo_lang', lang);
        }

        window.onload = () => setLanguage(localStorage.getItem('trivo_lang') || 'en');

        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        resize();
        const alphabet = "10";
        const fontSize = 16;
        const rainDrops = Array.from({ length: Math.floor(canvas.width/fontSize) }).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);
                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 35);
        window.addEventListener('resize', resize);
    </script>
</body>
</html>
