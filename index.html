<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIVO CHAT | GLOBAL PRIVACY & LEGAL SHIELD</title>
    <style>
        :root { --neon: #0f0; --dim: #030; --blue: #00ffff; --warn: #ff003c; --gold: #ffd700; }
        body, html { background: #000; color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .scanline { width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 50%, rgba(0,255,0,0.02) 50%); background-size: 100% 4px; position: fixed; pointer-events: none; z-index: 100; }
        
        .lang-control { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; align-items: center; background: rgba(0,20,0,0.8); padding: 10px; border: 1px solid var(--neon); box-shadow: 0 0 15px var(--dim); }
        .lang-btn { background: transparent; border: 1px solid var(--dim); color: var(--dim); padding: 5px 12px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.3s; }
        .lang-btn.active { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 10px var(--blue); }

        .wrapper { max-width: 1150px; margin: 50px auto; padding: 50px; border: 1px solid var(--neon); background: rgba(0,5,0,0.98); box-shadow: 0 0 60px var(--dim); position: relative; }
        .status-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--blue); border-bottom: 2px solid var(--dim); padding-bottom: 15px; margin-bottom: 40px; text-transform: uppercase; }
        
        h1 { font-size: 2.2rem; text-align: center; text-shadow: 0 0 20px var(--neon); margin-bottom: 10px; text-transform: uppercase; }
        .doc-sub { text-align: center; color: var(--blue); font-size: 0.9rem; margin-bottom: 50px; opacity: 0.8; }
        
        h2 { color: var(--blue); border-left: 6px solid var(--blue); padding-left: 20px; margin-top: 50px; font-size: 1.4rem; text-transform: uppercase; background: rgba(0,255,255,0.05); padding: 10px 20px; }
        
        .security-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 30px 0; }
        .security-card { border: 1px solid var(--dim); padding: 20px; background: rgba(0,40,0,0.2); transition: 0.3s; border-radius: 4px; }
        .security-card strong { color: var(--blue); display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.9rem; border-bottom: 1px solid var(--dim); padding-bottom: 5px; }

        .critical-alert { border: 3px double var(--warn); padding: 35px; background: rgba(60, 0, 0, 0.4); margin: 40px 0; position: relative; }
        .critical-tag { position: absolute; top: -18px; left: 30px; background: var(--warn); color: #fff; padding: 4px 20px; font-weight: bold; }
        
        p, li { color: #afffaf; line-height: 1.7; font-size: 0.95rem; text-align: justify; margin-bottom: 15px; }
        .highlight { color: #fff; font-weight: bold; }
        
        a { color: var(--blue); text-decoration: none; border-bottom: 1px dashed var(--blue); transition: 0.3s; }
        a:hover { color: var(--neon); border-color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .footer { margin-top: 80px; text-align: center; font-size: 0.85rem; color: #666; border-top: 1px solid #333; padding-top: 40px; }
        .abuse-box { text-align: center; border: 1px solid var(--dim); padding: 25px; background: rgba(0,255,0,0.05); margin-top: 30px; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        @media (max-width: 768px) { .wrapper { padding: 20px; margin: 20px; } h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="scanline"></div>

    <div class="lang-control">
        <button id="btn-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button id="btn-ru" class="lang-btn" onclick="setLanguage('ru')">RU</button>
    </div>

    <div class="wrapper">
        <div class="status-header">
            <span id="txt-layer"></span>
            <span id="node-status"></span>
            <span class="blink">● ENCRYPTION_STABLE</span>
        </div>

        <div class="security-grid" id="grid-access"></div>

        <h2 id="h-sec-recovery"></h2>

        <h2 id="h-sec-account"></h2>
        <div class="security-grid" id="grid-account"></div>

        <h2 id="h-sec-content"></h2>
        <div class="security-grid" id="grid-content"></div>

        <h2 id="h-sec-kids"></h2>
        <div class="critical-alert">
            <div class="critical-tag" id="tag-crit"></div>
            <p id="txt-crit-p"></p>
            <p style="font-size: 0.8rem; color: var(--warn);" id="txt-crit-note"></p>
        </div>

        <h2 id="h-sec-tech"></h2>
        <div class="security-grid" id="grid-tech"></div>

        <h2 id="h-sec-global"></h2>
        <div class="security-grid" id="grid-global"></div>

        <h2 id="h-sec-shield"></h2>
        <div class="security-grid" id="grid-shield"></div>

        <div class="footer">
            <p id="txt-google-link" style="margin-bottom: 20px;"></p>
            <div id="txt-footer"></div>
        </div>
        
        <div class="abuse-box">
            <span id="f-contact-title" style="color: var(--blue); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;"></span><br>
            <span class="highlight" style="font-size: 1.3rem; color: #fff; text-shadow: 0 0 10px var(--neon);">trivo.support@proton.me</span>
        </div>
    </div>

                "grid-biometry": [

                    ["Сквозное шифрование (E2EE)", "Сообщения защищены протоколами BouncyCastle 1.70. Ключи находятся только у пользователей."],
                    ["Биометрия", "Данные отпечатков/FaceID не покидают устройство. Мы используем только системные токены подтверждения."],
                    ["Zero-Knowledge", "Мы не можем читать ваши чаты. Мы даем инфраструктуру, вы владеете ключами доступа."]
                ],

                "h-sec-access": "II. ДОСТУП И АНОНИМНОСТЬ",
                "grid-access": [
                    ["Анонимные ID", "Номер телефона или почта не требуются. Личность привязана к локально созданному уникальному ID."],

                ],

                "h-sec-recovery": "III. ОБЛАЧНАЯ СИНХРОНИЗАЦИЯ И ВОССТАНОВЛЕНИЕ",
                "grid-recovery": [
                    ["Android Auto Backup", "Синхронизируется только 'identity.json' (ID, Ник, Друзья). Файл шифруется вашим паролем перед выгрузкой."],
                    ["Политика истории чатов", "Переписка НИКОГДА не копируется в облако. Удаление приложения стирает все чаты безвозвратно."],
                    ["Ручной экспорт", "Вы можете сохранить файл восстановления '.vault' вручную в настройках для оффлайн хранения."]
                ],

                "h-sec-account": "IV. УДАЛЕНИЕ ДАННЫХ И ПРАВО НА ЗАБВЕНИЕ",
                "grid-account": [

                    ["SSL Pinning", "Трафик защищен от перехвата (MitM) через SSL Pinning и протоколы HTTPS/TLS."],

                "grid-global": [

                    ["Управление рекламой", "Вы можете сбросить рекламный ID в настройках Android в любое время."],

                ],

                "h-sec-shield": "IX. ЮРИДИЧЕСКАЯ ЗАЩИТА",
                "grid-shield": [
                    ["Арбитраж", "Все споры решаются через частный арбитраж, без права на коллективные иски."],
                    ["Отказ от ответственности", "Сервис предоставляется «как есть». Мы не отвечаем за потерю данных при смене устройства."],
                    ["Секция 230", "Мы являемся платформой, а не издателем, и не несем ответственности за контент пользователей."]

        function setLanguage(lang) {
            const data = translations[lang];
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
            
            for (let key in data) {
                const el = document.getElementById(key);
                if (el) {
                    if (key.startsWith('grid')) {
                        el.innerHTML = data[key].map(i => `<div class="security-card"><strong>${i[0]}</strong><span>${i[1]}</span></div>`).join('');
                    } else { el.innerHTML = data[key]; }
                }
            }
            localStorage.setItem('trivo_lang', lang);
        }

        window.onload = () => setLanguage(localStorage.getItem('trivo_lang') || 'en');

        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        resize();
        const alphabet = "10";
        const fontSize = 16;
        const rainDrops = Array.from({ length: Math.floor(canvas.width/fontSize) }).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize);
                if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 35);
        window.addEventListener('resize', resize);
    </script>
</body>
</html>
